<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; worker-src 'self'; object-src 'none'; base-uri 'none'; form-action 'self'">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="训练日志">
    <meta name="theme-color" content="#f2f2f7">

    <link rel="apple-touch-icon" href="./assets/icon-192.png">
    <link rel="icon" href="./assets/icon-192.png" type="image/png">
    <link rel="manifest" href="./manifest.json">

    <title>训练日志</title>
    <link rel="stylesheet" href="./assets/app.css">
    <link rel="stylesheet" href="./assets/vendor/fontawesome/css/all.min.css">
    <script src="./assets/vendor/chart.umd.min.js"></script>
    <style>
        :root {
            --ios-bg: #f2f2f7;
            --safe-top: env(safe-area-inset-top, 20px);
            --safe-bottom: env(safe-area-inset-bottom, 20px);
            --app-height: 100dvh;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--ios-bg);
            color: #1c1c1e;
            -webkit-font-smoothing: antialiased;
            height: var(--app-height);
            overflow: hidden;
            position: fixed;
            width: 100%;
            top: 0;
            left: 0;
        }

        #app {
            max-width: 500px;
            margin: 0 auto;
            background: var(--ios-bg);
            height: 100%;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .scroll-container {
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior-y: contain;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }

        input, select, textarea {
            font-size: 16px !important;
            transform: scale(1);
            -webkit-user-select: text;
            user-select: text;
        }

        button { -webkit-user-select: none; user-select: none; }
        button:focus-visible, input:focus-visible, select:focus-visible, textarea:focus-visible {
            outline: 3px solid rgba(37, 99, 235, 0.22);
            outline-offset: 2px;
        }
        
        input:disabled {
            background-color: #f3f4f6;
            color: #9ca3af;
            border-color: transparent;
        }

        .active-scale:active { transform: scale(0.96); transition: transform 0.1s; }

        #modal-overlay { z-index: 50; }
        #modal-card {
            max-height: 85%;
            padding-bottom: calc(var(--safe-bottom) + 20px);
        }
    </style>
</head>
<body ontouchstart="">

    <div id="app">
        <header class="px-5 pb-3 pt-[calc(var(--safe-top)+10px)] bg-white/90 backdrop-blur-md border-b border-gray-200 z-20 flex-shrink-0">
            <span id="date-display" class="text-blue-600 text-[10px] font-bold tracking-widest">正在载入</span>
            <h1 id="page-title" class="text-2xl font-black tracking-tight text-gray-900 mt-1">训练日志</h1>
        </header>

        <!-- Home View -->
        <div id="view-home" class="flex-1 flex flex-col overflow-hidden relative">
            <div class="bg-white/50 backdrop-blur-sm z-10 py-3 flex-shrink-0">
                <div id="tabs-container" class="grid grid-cols-5 gap-1 mx-4 p-1 bg-gray-100 rounded-2xl"></div>
                <div class="flex items-center justify-between px-4 mt-3">
                    <button type="button" aria-label="上一周" onclick="App.shiftWeek(-1)" class="w-10 h-10 rounded-full bg-white text-gray-500 border border-gray-100 shadow-sm active-scale">
                        <i class="fa-solid fa-chevron-left text-xs"></i>
                    </button>
                    <button type="button" aria-label="回到本周" onclick="App.goToday()" class="px-5 py-2 rounded-2xl bg-white border border-gray-100 shadow-sm text-center active-scale">
                        <span id="selected-date-label" class="block text-sm font-black text-gray-900">--</span>
                        <span id="selected-week-label" class="block text-[10px] font-bold text-blue-500 mt-0.5">回到本周</span>
                    </button>
                    <button type="button" aria-label="下一周" onclick="App.shiftWeek(1)" class="w-10 h-10 rounded-full bg-white text-gray-500 border border-gray-100 shadow-sm active-scale">
                        <i class="fa-solid fa-chevron-right text-xs"></i>
                    </button>
                </div>
                <div id="day-status-control" class="px-4 mt-3">
                    <div class="grid grid-cols-3 gap-1 p-1 bg-gray-100 rounded-2xl" role="group" aria-label="本次训练状态">
                        <button type="button" data-day-status="normal" aria-pressed="true" onclick="App.setDayStatus('normal')" class="h-10 rounded-xl text-xs font-bold transition-all">正常</button>
                        <button type="button" data-day-status="poor" aria-pressed="false" onclick="App.setDayStatus('poor')" class="h-10 rounded-xl text-xs font-bold transition-all">状态不佳</button>
                        <button type="button" data-day-status="deload" aria-pressed="false" onclick="App.setDayStatus('deload')" class="h-10 rounded-xl text-xs font-bold transition-all">减载</button>
                    </div>
                    <div class="flex items-center justify-center gap-1.5 mt-2 px-2">
                        <span id="day-status-dot" class="w-1.5 h-1.5 rounded-full bg-blue-500 flex-shrink-0"></span>
                        <p id="day-status-hint" class="text-[11px] text-center text-gray-500">计入双重渐进，建议按 RIR 1–2 完成</p>
                    </div>
                </div>
            </div>
            <main id="main-list" class="flex-1 scroll-container px-4 py-4 pb-40">
                <div class="animate-pulse space-y-4">
                    <div class="h-24 bg-gray-200 rounded-2xl"></div>
                    <div class="h-24 bg-gray-200 rounded-2xl"></div>
                </div>
            </main>
        </div>

        <div id="view-stats" class="flex-1 hidden scroll-container px-4 py-6 pb-40 bg-gray-50">
            <div class="space-y-5">
                <div id="weekly-summary" class="grid grid-cols-2 gap-3"></div>
                <div class="bg-white p-5 rounded-3xl border border-gray-100">
                    <h3 class="text-base font-black text-gray-900 mb-4 flex items-center"><i class="fa-solid fa-chart-simple text-blue-500 mr-2"></i>本周完成度</h3>
                    <div class="h-56 relative"><canvas id="completionChart"></canvas></div>
                </div>
                <div class="bg-white p-5 rounded-3xl border border-gray-100">
                    <div class="flex items-center justify-between mb-4">
                        <h3 class="text-lg font-bold text-gray-800">月度概览</h3>
                        <span id="month-label" class="text-xs font-bold text-blue-500 bg-blue-50 px-3 py-1 rounded-full">--</span>
                    </div>
                    <div id="monthly-summary" class="grid grid-cols-2 gap-3"></div>
                </div>
                <div class="bg-white p-5 rounded-3xl border border-gray-100">
                    <div class="flex items-center justify-between gap-3 mb-4">
                        <h3 class="text-lg font-bold text-gray-800 flex-shrink-0">动作趋势</h3>
                        <select id="trend-exercise-select" onchange="App.renderTrendChart()" class="min-w-0 flex-1 h-10 rounded-2xl bg-white px-3 text-xs font-bold border border-gray-100"></select>
                    </div>
                    <div id="trend-empty" class="hidden text-center py-10 text-sm text-gray-400">暂无趋势数据。</div>
                    <div id="trend-chart-wrap" class="h-64 relative"><canvas id="trendChart"></canvas></div>
                </div>
                <div class="bg-white p-5 rounded-3xl border border-gray-100">
                    <h3 class="text-lg font-bold text-gray-800 mb-3">最近重量</h3>
                    <div id="recent-progress-list" class="space-y-3 text-sm text-gray-600"></div>
                </div>
                <div class="pt-4">
                    <button type="button" onclick="App.exportData()" class="w-full py-4 bg-emerald-600 text-white rounded-2xl font-bold text-base active:scale-[0.98] transition-all flex items-center justify-center space-x-2">
                        <i class="fa-solid fa-file-csv"></i><span>导出 CSV 数据</span>
                    </button>
                    <div class="grid grid-cols-2 gap-3 mt-3">
                        <button type="button" onclick="App.exportBackup()" class="py-3 bg-gray-900 text-white rounded-2xl font-bold text-sm active:scale-[0.98] transition-all flex items-center justify-center space-x-2">
                            <i class="fa-solid fa-download"></i><span>备份 JSON</span>
                        </button>
                        <button type="button" onclick="App.importBackup()" class="py-3 bg-white text-gray-700 rounded-2xl font-bold text-sm border border-gray-200 active:scale-[0.98] transition-all flex items-center justify-center space-x-2">
                            <i class="fa-solid fa-upload"></i><span>恢复备份</span>
                        </button>
                    </div>
                    <button type="button" onclick="App.clearAllData()" class="w-full mt-3 py-3 bg-red-50 text-red-600 rounded-2xl font-bold text-sm border border-red-100 active:scale-[0.98] transition-all flex items-center justify-center space-x-2">
                        <i class="fa-solid fa-trash-can"></i><span>清空本地数据</span>
                    </button>
                    <input id="backup-file-input" class="hidden" type="file" accept="application/json,.json" onchange="App.handleBackupFile(this)">
                    <p class="text-center text-xs text-gray-400 mt-3">JSON 用于恢复，CSV 可用 Excel 打开</p>
                </div>
            </div>
        </div>

        <div id="view-plan" class="flex-1 hidden scroll-container px-4 py-6 pb-40 bg-gray-50">
            <div class="space-y-5">
                <div>
                    <h2 class="text-2xl font-black text-gray-900">训练计划</h2>
                    <p class="text-sm text-gray-400 mt-1">按自己的器械和状态调整动作。</p>
                </div>
                <div id="plan-tabs-container" class="grid grid-cols-5 gap-1 p-1 bg-gray-100 rounded-2xl"></div>
                <div class="bg-gray-50 p-4 rounded-3xl border border-gray-100">
                    <div class="flex items-center justify-between mb-4">
                        <div>
                            <h3 id="plan-day-title" class="text-lg font-black text-gray-900">--</h3>
                            <p id="plan-day-count" class="text-xs text-gray-400 mt-1">--</p>
                        </div>
                        <button type="button" aria-label="添加动作" onclick="App.openPlanEditor()" class="w-10 h-10 rounded-full bg-blue-600 text-white active-scale">
                            <i class="fa-solid fa-plus text-sm"></i>
                        </button>
                    </div>
                    <div id="plan-list" class="space-y-3"></div>
                </div>
                <div class="bg-gray-50 p-4 rounded-3xl border border-gray-100 space-y-3">
                    <div class="flex items-center justify-between">
                        <h3 class="text-base font-black text-gray-900">计划复制</h3>
                        <i class="fa-solid fa-copy text-blue-500"></i>
                    </div>
                    <div class="grid grid-cols-[1fr_auto] gap-2">
                        <select id="plan-copy-target" class="h-11 rounded-2xl bg-white px-3 text-sm font-bold border border-gray-100"></select>
                        <button type="button" onclick="App.copyCurrentPlanToTarget()" class="px-4 h-11 rounded-2xl bg-blue-600 text-white font-bold text-sm active-scale">复制到</button>
                    </div>
                    <div class="grid grid-cols-[1fr_auto] gap-2">
                        <select id="plan-copy-source" class="h-11 rounded-2xl bg-white px-3 text-sm font-bold border border-gray-100"></select>
                        <button type="button" onclick="App.copyPlanFromSource()" class="px-4 h-11 rounded-2xl bg-white text-gray-700 border border-gray-200 font-bold text-sm active-scale">从它复制</button>
                    </div>
                </div>
                <button type="button" onclick="App.resetPlanDay()" class="w-full py-3 bg-white text-red-600 rounded-2xl font-bold text-sm border border-red-100 active:scale-[0.98] transition-all flex items-center justify-center space-x-2">
                    <i class="fa-solid fa-rotate-left"></i><span>恢复当天默认计划</span>
                </button>
            </div>
        </div>

        <nav class="absolute bottom-0 w-full bg-white/90 backdrop-blur-xl border-t border-gray-200 pb-[calc(var(--safe-bottom)+15px)] pt-3 px-6 flex justify-around items-center z-30">
            <button type="button" onclick="App.setView('home')" class="flex flex-col items-center text-blue-600 active-scale transition-colors w-16" id="nav-home">
                <i class="fa-solid fa-dumbbell text-xl mb-1"></i><span class="text-[10px] font-bold">训练</span>
            </button>
            <button type="button" onclick="App.setView('stats')" class="flex flex-col items-center text-gray-400 active-scale transition-colors w-16" id="nav-stats">
                <i class="fa-solid fa-chart-pie text-xl mb-1"></i><span class="text-[10px] font-bold">统计</span>
            </button>
            <button type="button" onclick="App.setView('plan')" class="flex flex-col items-center text-gray-400 active-scale transition-colors w-16" id="nav-plan">
                <i class="fa-solid fa-list-check text-xl mb-1"></i><span class="text-[10px] font-bold">计划</span>
            </button>
        </nav>

        <div id="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-title" class="fixed inset-0 bg-black/40 hidden transition-opacity duration-300 opacity-0" onclick="if(event.target === this) App.closeModal()">
            <div id="modal-card" class="absolute bottom-0 w-full max-w-[500px] left-1/2 -translate-x-1/2 bg-white rounded-t-[32px] shadow-2xl transform translate-y-full transition-transform duration-300 flex flex-col">
                <div class="px-6 py-4 border-b border-gray-100 flex justify-between items-center bg-white rounded-t-[32px] flex-shrink-0">
                    <h3 id="modal-title" class="text-lg font-black text-gray-800">--</h3>
                    <button type="button" aria-label="关闭记录弹窗" onclick="App.closeModal()" class="w-9 h-9 rounded-full bg-gray-100 text-gray-500 flex items-center justify-center active-scale"><i class="fa-solid fa-xmark"></i></button>
                </div>
                <div class="scroll-container p-6 space-y-6 flex-1 overflow-y-auto">
                    <div id="rest-timer" class="hidden bg-gray-900 text-white p-4 rounded-2xl items-center gap-3 shadow-lg">
                        <div class="w-10 h-10 rounded-xl bg-white/10 flex items-center justify-center"><i class="fa-solid fa-clock"></i></div>
                        <div class="flex-1">
                            <div id="rest-timer-label" class="text-[10px] font-bold text-gray-300 uppercase tracking-wider">组间休息</div>
                            <div id="rest-timer-value" class="text-2xl font-black tabular-nums">01:00</div>
                        </div>
                        <button type="button" onclick="App.skipRestTimer()" class="px-3 py-2 rounded-xl bg-white/10 text-xs font-bold">跳过</button>
                    </div>
                    <div id="modal-tips" class="bg-slate-50 p-4 rounded-2xl text-slate-700 text-xs font-medium leading-relaxed border border-slate-200"></div>
                    <div id="progression-advice" class="hidden p-4 rounded-2xl text-xs leading-relaxed border"></div>
                    <div class="space-y-3">
                        <div class="flex text-[10px] font-bold text-gray-400 px-2 uppercase tracking-wider" id="input-headers">
                            <span class="w-10 text-center">SET</span>
                            <span class="flex-1 text-center">KG</span>
                            <span class="flex-1 text-center">REPS</span>
                        </div>
                        <div id="modal-inputs" class="space-y-3"></div>
                    </div>
                </div>
                <div class="p-6 border-t border-gray-100 bg-white flex-shrink-0">
                    <button type="button" onclick="App.saveCurrentLog()" class="w-full py-4 bg-blue-600 text-white rounded-2xl font-bold text-base active:scale-[0.98] transition-all">保存记录</button>
                </div>
            </div>
        </div>

        <div id="plan-modal-overlay" role="dialog" aria-modal="true" aria-labelledby="plan-modal-title" class="fixed inset-0 bg-black/40 hidden transition-opacity duration-300 opacity-0 z-[60]" onclick="if(event.target === this) App.closePlanModal()">
            <div id="plan-modal-card" class="absolute bottom-0 w-full max-w-[500px] left-1/2 -translate-x-1/2 bg-white rounded-t-[32px] shadow-2xl transform translate-y-full transition-transform duration-300 flex flex-col max-h-[90%] pb-[calc(var(--safe-bottom)+18px)]">
                <div class="px-6 py-4 border-b border-gray-100 flex justify-between items-center bg-white rounded-t-[32px] flex-shrink-0">
                    <h3 id="plan-modal-title" class="text-lg font-black text-gray-800">编辑动作</h3>
                    <button type="button" aria-label="关闭计划弹窗" onclick="App.closePlanModal()" class="w-9 h-9 rounded-full bg-gray-100 text-gray-500 flex items-center justify-center active-scale"><i class="fa-solid fa-xmark"></i></button>
                </div>
                <div class="scroll-container p-6 space-y-4 flex-1 overflow-y-auto">
                    <label class="block">
                        <span class="block text-xs font-bold text-gray-400 mb-2">动作库</span>
                        <select id="plan-ex-library" onchange="App.applyLibraryExercise(this.value)" class="w-full h-12 rounded-2xl bg-blue-50 px-4 font-bold text-blue-700 border border-transparent focus:border-blue-500">
                            <option value="">手动填写 / 选择常用动作</option>
                        </select>
                    </label>
                    <label class="block">
                        <span class="block text-xs font-bold text-gray-400 mb-2">动作名称</span>
                        <input id="plan-ex-name" type="text" maxlength="100" class="w-full h-12 rounded-2xl bg-gray-50 px-4 font-bold border border-transparent focus:border-blue-500" placeholder="例如：器械腿推">
                    </label>
                    <label class="block">
                        <span class="block text-xs font-bold text-gray-400 mb-2">动作类型</span>
                        <select id="plan-ex-type" onchange="App.updatePlanProgressionFields()" class="w-full h-12 rounded-2xl bg-gray-50 px-4 font-bold border border-transparent focus:border-blue-500">
                            <option value="weighted">负重动作</option>
                            <option value="bodyweight">自重动作</option>
                            <option value="time">计时动作</option>
                            <option value="cardio">有氧运动</option>
                        </select>
                    </label>
                    <div class="grid grid-cols-2 gap-3">
                        <label class="block">
                            <span class="block text-xs font-bold text-gray-400 mb-2">目标组数</span>
                            <input id="plan-ex-sets" type="number" min="1" max="20" inputmode="numeric" class="w-full h-12 rounded-2xl bg-gray-50 px-4 font-bold border border-transparent focus:border-blue-500" placeholder="3">
                        </label>
                        <label class="block" id="plan-target-reps-field">
                            <span class="block text-xs font-bold text-gray-400 mb-2">目标次数/时间</span>
                            <input id="plan-ex-reps" type="text" maxlength="30" class="w-full h-12 rounded-2xl bg-gray-50 px-4 font-bold border border-transparent focus:border-blue-500" placeholder="12 或 30s">
                        </label>
                    </div>
                    <div id="plan-progression-fields" class="bg-emerald-50 border border-emerald-100 rounded-2xl p-4 space-y-3">
                        <div>
                            <div class="text-xs font-black text-emerald-800">双重渐进</div>
                            <div class="text-[11px] text-emerald-700 mt-1">先在次数区间内逐组增加次数，全部达到上限后再加重。</div>
                        </div>
                        <div class="grid grid-cols-3 gap-2">
                            <label class="block">
                                <span class="block text-[10px] font-bold text-emerald-700 mb-1">次数下限</span>
                                <input id="plan-ex-rep-min" type="number" min="1" max="100" class="w-full h-11 rounded-xl bg-white px-3 font-bold border border-emerald-100" placeholder="8">
                            </label>
                            <label class="block">
                                <span class="block text-[10px] font-bold text-emerald-700 mb-1">次数上限</span>
                                <input id="plan-ex-rep-max" type="number" min="1" max="100" class="w-full h-11 rounded-xl bg-white px-3 font-bold border border-emerald-100" placeholder="12">
                            </label>
                            <label class="block" id="plan-weight-step-field">
                                <span class="block text-[10px] font-bold text-emerald-700 mb-1">加重 KG</span>
                                <input id="plan-ex-weight-step" type="number" min="0.25" max="100" step="0.25" class="w-full h-11 rounded-xl bg-white px-3 font-bold border border-emerald-100" placeholder="2.5">
                            </label>
                        </div>
                    </div>
                    <label class="block">
                        <span class="block text-xs font-bold text-gray-400 mb-2">动作提示</span>
                        <textarea id="plan-ex-detail" rows="4" class="w-full rounded-2xl bg-gray-50 p-4 text-sm leading-relaxed border border-transparent focus:border-blue-500" placeholder="写下座椅高度、发力感觉、注意事项等。"></textarea>
                    </label>
                </div>
                <div class="p-6 border-t border-gray-100 bg-white flex-shrink-0 space-y-3">
                    <button type="button" onclick="App.savePlanExercise()" class="w-full py-4 bg-blue-600 text-white rounded-2xl font-bold text-base active:scale-[0.98] transition-all">保存动作</button>
                    <button type="button" id="plan-delete-btn" onclick="App.deletePlanExercise()" class="hidden w-full py-3 bg-red-50 text-red-600 rounded-2xl font-bold text-sm border border-red-100 active:scale-[0.98] transition-all">删除动作</button>
                </div>
            </div>
        </div>

        <div id="toast" role="status" aria-live="polite" class="fixed top-24 left-1/2 -translate-x-1/2 max-w-[calc(100%_-_32px)] bg-gray-900/95 text-white px-5 py-3 rounded-full text-xs font-bold shadow-2xl pointer-events-none opacity-0 transition-opacity duration-300 z-[100]"><span id="toast-msg">已保存</span></div>
    </div>

    <script>
        function fixViewportHeight() {
            document.documentElement.style.setProperty('--app-height', `${window.innerHeight}px`);
        }
        window.addEventListener('resize', fixViewportHeight);
        window.addEventListener('orientationchange', fixViewportHeight);
        fixViewportHeight();

        const DATA_KEY = 'drlog_gym_pro_daily_v1';
        const LEGACY_DATA_KEY = 'drlog_gym_pro_data';
        const PLAN_KEY = 'drlog_gym_pro_plan_v1';
        const CARDIO_MODES = ['有氧运动', '椭圆机', '爬楼机', '跑步机爬坡', '跑步机慢跑', '单车'];
        const UNSAFE_OBJECT_KEYS = new Set(['__proto__', 'prototype', 'constructor']);
        let storageAvailable = true;

        const SAFE_ICONS = new Set([
            'fa-angles-down', 'fa-arrows-down-to-line', 'fa-arrows-up-to-line', 'fa-bug',
            'fa-cubes-stacked', 'fa-dumbbell', 'fa-hand-back-fist', 'fa-hand-fist',
            'fa-hands-asl-interpreting', 'fa-heart-pulse', 'fa-minus', 'fa-person',
            'fa-person-praying', 'fa-person-walking', 'fa-person-walking-arrow-right',
            'fa-stopwatch', 'fa-up-long', 'fa-users-viewfinder', 'fa-weight-hanging'
        ]);

        function createExerciseId(day = 'custom') {
            if (window.crypto && typeof window.crypto.randomUUID === 'function') return window.crypto.randomUUID();
            return `${day}-${Date.now().toString(36)}-${Math.random().toString(36).slice(2, 10)}`;
        }

        function sanitizeExerciseId(value, fallback = createExerciseId()) {
            const normalized = String(value ?? '')

                        const safeKey = sanitizeExerciseId(key, `legacy-entry-${entryIndex}`);
                        const exercise = legacyIndex >= 0
                            ? plan && plan.exercises[legacyIndex]
                            : plan && plan.exercises.find(item => item.id === safeKey);
                        const targetKey = exercise ? exercise.id : safeKey;
                        if (UNSAFE_OBJECT_KEYS.has(targetKey) || Object.prototype.hasOwnProperty.call(entries, targetKey)) return;
                        entries[targetKey] = sanitizeRows(rawEntries[key]);
                        const snapshot = sanitizeSnapshot(rawSnapshots[key] || rawSnapshots[targetKey], targetKey)
                            || (exercise ? this.snapshotExercise(exercise) : null);
                        if (snapshot) exerciseSnapshots[targetKey] = { ...snapshot, id: targetKey };
                    });

                    cleanedLogs[dateKey] = {
                        version: 4,
                        day,
                        status: normalizeDayStatus(record.status),
                        entries,
                        exerciseSnapshots
                    };
                });
                this.state.logs = cleanedLogs;
                return JSON.stringify(cleanedLogs) !== original;
            },
            getExerciseRows(record, ex, legacyIndex) {
                if (!record || !record.entries) return [];
                const rows = record.entries[ex.id] ?? record.entries[legacyIndex];
                return Array.isArray(rows) ? rows : [];
            },
            getHistoricalExercise(record, key) {
                const snapshot = record && record.exerciseSnapshots && record.exerciseSnapshots[key];
                if (snapshot) return snapshot;
                const plan = record && this.state.workouts[record.day];
                if (!plan) return null;
                return plan.exercises.find(ex => ex.id === key) || (/^\d+$/.test(key) ? plan.exercises[Number(key)] : null);
            },
            saveData() {
                const saved = this.persistLocal();
                this.renderMain();
                if (this.state.currentView === 'stats') this.renderStats();
                return saved;
            },
            getSelectedRecord() {
                return this.state.logs[this.state.selectedDate] || { day: this.state.selectedDay, status: 'normal', entries: {} };
            },
            getLastExerciseRecord(day, exIdx, beforeDateKey = this.state.selectedDate, progressionOnly = false) {
                const ex = this.state.workouts[day] && this.state.workouts[day].exercises[exIdx];
                if (!ex) return null;
                const foundDate = Object.keys(this.state.logs)
                    .filter(dateKey => dateKey < beforeDateKey)
                    .sort()
                    .reverse()
                    .find(dateKey => {
                        const record = this.state.logs[dateKey];
                        if (progressionOnly && normalizeDayStatus(record && record.status) !== 'normal') return false;
                        const rows = record && record.day === day ? this.getExerciseRows(record, ex, exIdx) : null;
                        return isLogDone(ex, rows);
                    });
                if (!foundDate) return null;
                const rows = this.getExerciseRows(this.state.logs[foundDate], ex, exIdx);
                return { dateKey: foundDate, summary: summarizeRows(ex, rows), rows, status: normalizeDayStatus(this.state.logs[foundDate].status) };
            },
            getLastProgressionRecord(day, exIdx, beforeDateKey = this.state.selectedDate) {
                return this.getLastExerciseRecord(day, exIdx, beforeDateKey, true);
            },
            isCompletedSet(ex, row) {
                return rowIsCompleted(ex, row);
            },
            getProgressionAdvice(ex, rows, dayStatus = 'normal') {
                if (!ex || ex.type === 'cardio' || ex.type === 'time') return null;
                const normalizedStatus = normalizeDayStatus(dayStatus);
                if (normalizedStatus !== 'normal') {
                    return {
                        kind: 'excluded',
                        title: '本次仅记录，不参与递增',
                        detail: normalizedStatus === 'poor' ? '状态不佳的训练仍保留在历史和统计中；下次会继续参考最近一次正常训练。' : '主动减载用于恢复，不触发加重、保持或减重建议。'
                    };
                }
                const settings = progressionSettings(ex);
                const completed = (Array.isArray(rows) ? rows : []).filter(row => this.isCompletedSet(ex, row));
                if (!completed.length) {
                    return {
                        kind: 'start',
                        title: `目标 ${settings.repMin}–${settings.repMax} 次`,
                        detail: `先固定重量，在保留 1–2 次余力的前提下逐组增加次数。`
                    };
                }

                const requiredSets = Math.max(1, Number(ex.sets) || 1);
                if (completed.length < requiredSets) {
                    return {
                        kind: 'incomplete',
                        title: `先完成剩余 ${requiredSets - completed.length} 组`,
                        detail: '只根据已点击完成的正式组生成递增建议。'
                    };
                }

                const official = completed.slice(0, requiredSets);
                const reps = official.map(row => toNumber(row.r));
                const firstWeight = ex.type === 'weighted' ? toNumber(official.find(row => toNumber(row.w) > 0)?.w) : 0;
                const weights = ex.type === 'weighted' ? official.map(row => toNumber(row.w)).filter(n => n > 0) : [];
                const mixedWeights = weights.length > 1 && weights.some(weight => Math.abs(weight - weights[0]) > 0.001);
                if (mixedWeights) {
                    return {
                        kind: 'hold',
                        title: '本次正式组重量不一致',
                        detail: '双重渐进需要在同一重量下比较次数；递减组不用于触发加重。'
                    };
                }
                if (reps.some(value => value < settings.repMin)) {
                    return {
                        kind: 'recover',
                        title: '保持重量，先回到次数下限',
                        detail: `至少有一组低于 ${settings.repMin} 次。若连续两次如此，建议减重 5%–10%。`
                    };
                }

                const allAtTop = reps.every(value => value >= settings.repMax);
                const allRirRecorded = official.every(row => row.rir !== '' && row.rir !== undefined && Number.isFinite(Number(row.rir)));
                const minimumRir = allRirRecorded ? Math.min(...official.map(row => Number(row.rir))) : null;
                if (allAtTop && allRirRecorded && minimumRir >= 1) {
                    if (ex.type === 'weighted' && firstWeight > 0) {
                        const nextWeight = Math.round((firstWeight + settings.weightStep) * 100) / 100;
                        return {
                            kind: 'increase',
                            title: `下次建议 ${nextWeight}kg`,
                            detail: `全部正式组已达 ${settings.repMax} 次且仍有余力；加重 ${settings.weightStep}kg 后从 ${settings.repMin} 次附近重新推进。`,
                            nextWeight
                        };
                    }
                    return {
                        kind: 'increase',
                        title: '下次增加动作难度',
                        detail: `全部正式组已达 ${settings.repMax} 次；可增加小负重或更难变式，再从 ${settings.repMin} 次开始。`
                    };
                }
                if (allAtTop) {
                    return {
                        kind: 'hold',
                        title: '先保持当前重量',
                        detail: allRirRecorded ? '次数已达上限，但存在 RIR 0 的力竭组；先稳定到 RIR 1–2 再加重。' : '次数已达上限；下次补记 RIR，确认仍有 1–2 次余力后再加重。'
                    };
                }

                const total = reps.reduce((sum, value) => sum + value, 0);
                const targetTotal = Math.min(settings.repMax * requiredSets, total + 1);
                return {
                    kind: 'reps',
                    title: ex.type === 'weighted' && firstWeight ? `保持 ${firstWeight}kg，总次数 +1` : '保持当前难度，总次数 +1',
                    detail: `本次正式组共 ${total} 次，下次目标 ${targetTotal} 次，优先补齐次数最少的一组。`
                };
            },
            ensureSelectedRecord() {
                if (!this.state.logs[this.state.selectedDate]) {
                    this.state.logs[this.state.selectedDate] = { version: 4, day: this.state.selectedDay, status: 'normal', entries: {}, exerciseSnapshots: {} };
                }
                this.state.logs[this.state.selectedDate].day = this.state.selectedDay;
                if (!this.state.logs[this.state.selectedDate].entries) this.state.logs[this.state.selectedDate].entries = {};
                if (!this.state.logs[this.state.selectedDate].exerciseSnapshots) this.state.logs[this.state.selectedDate].exerciseSnapshots = {};
                this.state.logs[this.state.selectedDate].status = normalizeDayStatus(this.state.logs[this.state.selectedDate].status);

            setupAutoFill() {
                const rows = document.querySelectorAll('.set-row');
                if (rows.length < 2) return;
                
                const firstRowInputs = rows[0].querySelectorAll('input, select');
                firstRowInputs.forEach(input => {
                    if (input.dataset.hasListener) return;
                    input.dataset.hasListener = 'true';

                    const eventName = input.tagName === 'SELECT' ? 'change' : 'input';
                    input.addEventListener(eventName, (e) => {
                        const val = e.target.value;
                        let selector = '';
                        if (input.classList.contains('input-m')) selector = '.input-m';
                        else if (input.classList.contains('input-w')) selector = '.input-w';
                        else if (input.classList.contains('input-r')) selector = '.input-r';
                        else if (input.classList.contains('input-t')) selector = '.input-t';
                        else if (input.classList.contains('input-h')) selector = '.input-h';
                        else if (input.classList.contains('input-c')) selector = '.input-c';
                        
                        if (!selector) return;

                        const allRows = document.querySelectorAll('.set-row');
                        for (let i = 1; i < allRows.length; i++) {
                            const targetInput = allRows[i].querySelector(selector);
                            if (targetInput) {
                                if (targetInput.value === '' || targetInput.dataset.autofilled === 'true') {
                                    targetInput.value = val;
                                    targetInput.dataset.autofilled = 'true';
                                }
                            }
                        }
                    });
                });

                for (let i = 1; i < rows.length; i++) {
                    const inputs = rows[i].querySelectorAll('input, select');
                    inputs.forEach(input => {
                        if (input.dataset.hasBreakListener) return;
                        input.dataset.hasBreakListener = 'true';
                        const eventName = input.tagName === 'SELECT' ? 'change' : 'input';
                        input.addEventListener(eventName, () => {
                            input.dataset.autofilled = 'false';
                        });
                    });
                }
            },

            toggleSetComplete(button) {
                const row = button.closest('.set-row');
                const ex = this.state.workouts[this.state.selectedDay].exercises[this.state.modalExIdx];
                if (!row || !ex) return;
                const completing = row.dataset.completed !== 'true';
                if (completing) {
                    const reps = row.querySelector('.input-r');
                    const weight = row.querySelector('.input-w');
                    const duration = row.querySelector('.input-t');
                    const invalidInput = Array.from(row.querySelectorAll('input')).find(input => input.value && !input.checkValidity());
                    if (invalidInput) {
                        invalidInput.focus();
                        alert('请填写有效的非负数值。');

                    }
                    if (ex.type === 'cardio' && !sanitizeMetric(duration.value, 't') && !sanitizeMetric(row.querySelector('.input-c').value, 'c')) {
                        alert('请先填写有氧时长或热量。');
                        return;

                    if (ex.type !== 'cardio' && (!sanitizeMetric(reps.value, 'r') || (ex.type === 'weighted' && !sanitizeMetric(weight.value, 'w')))) {
                        alert(ex.type === 'weighted' ? '请先填写重量和次数。' : '请先填写次数或时间。');

                }

                row.classList.toggle('border-green-200', completing);

            startRestTimer(seconds = 60) {
                clearInterval(this.state.restTimerId);
                this.state.restEndsAt = Date.now() + seconds * 1000;
                this.updateRestTimer();
                this.state.restTimerId = setInterval(() => this.updateRestTimer(), 250);
            },
            updateRestTimer() {
                const timer = document.getElementById('rest-timer');
                const value = document.getElementById('rest-timer-value');
                const label = document.getElementById('rest-timer-label');
                if (!timer || !value || !label || !this.state.restEndsAt) return;
                const remaining = Math.max(0, Math.ceil((this.state.restEndsAt - Date.now()) / 1000));
                timer.classList.remove('hidden');
                timer.classList.add('flex');
                const minutes = Math.floor(remaining / 60);
                const seconds = remaining % 60;
                value.innerText = `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
                label.innerText = remaining ? '组间休息' : '休息结束';
                if (remaining > 0) return;
                clearInterval(this.state.restTimerId);
                this.state.restTimerId = null;
                this.state.restEndsAt = 0;
                value.innerText = '开始';
                if ('vibrate' in navigator) navigator.vibrate([180, 100, 180]);
                this.showToast('休息结束，开始下一组');
            },
            skipRestTimer() {
                clearInterval(this.state.restTimerId);
                this.state.restTimerId = null;
                this.state.restEndsAt = 0;
                const timer = document.getElementById('rest-timer');
                if (timer) {
                    timer.classList.add('hidden');
                    timer.classList.remove('flex');
                }
            },

            openModal(idx) {
                this.state.lastFocusedElement = document.activeElement;
                this.state.modalExIdx = idx;
                const ex = this.state.workouts[this.state.selectedDay].exercises[idx];
                const selectedRecord = this.getSelectedRecord();
                const dayStatus = normalizeDayStatus(selectedRecord.status);
                const logs = this.getExerciseRows(selectedRecord, ex, idx);
                const last = this.getLastExerciseRecord(this.state.selectedDay, idx);
                const lastProgression = this.getLastProgressionRecord(this.state.selectedDay, idx);
                const hasCurrentData = logs.some(row => this.isCompletedSet(ex, row) || row.r || row.t || row.c);
                const lastAdvice = lastProgression ? this.getProgressionAdvice(ex, lastProgression.rows) : this.getProgressionAdvice(ex, []);
                const lastWeight = lastProgression && ex.type === 'weighted' ? toNumber(lastProgression.rows.find(row => rowIsCompleted(ex, row) && toNumber(row.w) > 0)?.w) : 0;
                const recommendedWeight = lastAdvice && lastAdvice.nextWeight ? lastAdvice.nextWeight : lastWeight;

                document.getElementById('modal-title').innerText = ex.name;
                document.getElementById('modal-tips').innerHTML = `<div class="font-bold text-slate-800 mb-1">动作提示</div>${escapeHtml(ex.detail)}${last ? `<div class="mt-2 pt-2 border-t border-slate-200 text-blue-700"><i class="fa-solid fa-clock-rotate-left mr-1"></i>上次：${escapeHtml(last.summary)} · ${formatShortDate(last.dateKey)}</div>` : ''}`;
                
                const isBw = ex.type === 'bodyweight' || ex.type === 'time';
                const isTime = ex.type === 'time';
                const isCardio = ex.type === 'cardio';

                const headers = document.getElementById('input-headers');
                if (isCardio) {
                    headers.innerHTML = `
                        <span class="w-full text-center">方式、时长、心率与热量</span>
                    `;
                } else {
                    headers.innerHTML = `
                        <span class="w-full text-center">${isTime ? `每组记录秒数，完成后点击 ✓` : `目标 ${targetLabel(ex)} 次 · RIR 1–2 · 完成后点击 ✓`}</span>
                    `;
                }

                let html = '';
                const currentSetsCount = Math.max(ex.sets, logs.length);
                for(let i=1; i<=currentSetsCount; i++) {
                    const l = logs[i-1] || {w: recommendedWeight || '', r:'', t:'', h:'', c:'', m:'', rir:'', done:false};
                    const done = this.isCompletedSet(ex, l);
                    html += this.renderSetRow(i, l.w, l.r, targetLabel(ex), isBw, isCardio, l.t, l.h, l.c, l.m, l.rir, done, isTime);
                }

                html += `<div id="add-set-btn-wrapper" class="pt-2">
                        <button type="button" onclick="App.addSetForCurrentExercise()" class="w-full py-3 border-2 border-dashed border-gray-200 text-gray-500 rounded-xl font-bold hover:border-blue-400 hover:text-blue-500 transition-colors flex items-center justify-center space-x-2 active:scale-[0.98]">
                            <i class="fa-solid fa-plus"></i><span>增加一组 (当前${currentSetsCount}组)</span>
                        </button>
                    </div>`;

                document.getElementById('modal-inputs').innerHTML = html;
                const overlay = document.getElementById('modal-overlay');
                overlay.classList.remove('hidden');
                
                this.setupAutoFill();
                this.setupProgressionTracking();
                const currentAdvice = dayStatus !== 'normal'
                    ? this.getProgressionAdvice(ex, logs, dayStatus)
                    : (hasCurrentData ? this.getProgressionAdvice(ex, logs) : lastAdvice);
                const adviceSource = dayStatus !== 'normal' ? dayStatusLabel(dayStatus) : (!hasCurrentData && lastProgression ? '根据最近正常训练' : '');
                this.renderProgressionAdvice(currentAdvice, adviceSource);
                if (this.state.restEndsAt) this.updateRestTimer();
                else {
                    const timer = document.getElementById('rest-timer');
                    timer.classList.add('hidden');
                    timer.classList.remove('flex');
                }

                setTimeout(() => {
                    overlay.classList.remove('opacity-0');
                    document.getElementById('modal-card').classList.remove('translate-y-full');
                    overlay.querySelector('[aria-label="关闭记录弹窗"]')?.focus();
                }, 10);
            },

                overlay.classList.add('opacity-0');
                document.getElementById('modal-card').classList.add('translate-y-full');
                setTimeout(() => {
                    overlay.classList.add('hidden');
                    this.state.lastFocusedElement?.focus?.();
                }, 300);
            },

            savePlanExercise() {
                const name = document.getElementById('plan-ex-name').value.trim().slice(0, 100);
                const type = document.getElementById('plan-ex-type').value;
                const sets = Math.min(20, Math.max(1, Number(document.getElementById('plan-ex-sets').value) || 1));
                const usesProgression = type === 'weighted' || type === 'bodyweight';
                const repMin = Math.min(100, Math.max(1, Number(document.getElementById('plan-ex-rep-min').value) || 8));
                const repMax = Math.min(100, Math.max(repMin, Number(document.getElementById('plan-ex-rep-max').value) || 12));
                const weightStep = Math.min(100, Math.max(0.25, Number(document.getElementById('plan-ex-weight-step').value) || 2.5));
                const reps = usesProgression ? String(repMax) : (document.getElementById('plan-ex-reps').value.trim() || (type === 'cardio' ? '25min' : '30s')).slice(0, 30);
                const detail = (document.getElementById('plan-ex-detail').value.trim() || '保持动作稳定，按当天状态微调。').slice(0, 500);

                if (!name) {
                    alert('请填写动作名称');
                    return;
                }
                const invalidInput = ['plan-ex-sets', 'plan-ex-rep-min', 'plan-ex-rep-max', 'plan-ex-weight-step']
                    .map(id => document.getElementById(id))
                    .find(input => !input.closest('.hidden') && !input.checkValidity());
                if (invalidInput) {
                    invalidInput.focus();
                    alert('请检查组数、次数区间和加重量。');
                    return;
                }

                const day = this.state.workouts[this.state.selectedDay];
                const existing = this.state.planEditIdx === null || this.state.planEditIdx === undefined ? null : day.exercises[this.state.planEditIdx];
                const exercise = {
                    id: existing && existing.id ? existing.id : createExerciseId(this.state.selectedDay),
                    name,
                    type,
                    sets,
                    reps,
                    repMin,
                    repMax,
                    weightStep,
                    icon: safeIcon(this.state.planDraftIcon, type),
                    detail
                };
                if (this.state.planEditIdx === null || this.state.planEditIdx === undefined) {
                    day.exercises.push(exercise);
                } else {
                    day.exercises[this.state.planEditIdx] = exercise;
                }

                const saved = this.savePlan();
                this.closePlanModal();
                this.renderAll();
                this.showToast(saved ? '计划已保存' : '计划保存失败，请检查浏览器存储');
            },
            deletePlanExercise() {
                if (this.state.planEditIdx === null || this.state.planEditIdx === undefined) return;
                if (!confirm('确定删除这个动作？已有历史记录会继续保留。')) return;
                this.state.workouts[this.state.selectedDay].exercises.splice(this.state.planEditIdx, 1);
                const saved = this.savePlan();
                this.closePlanModal();
                this.renderAll();
                this.showToast(saved ? '动作已删除' : '计划保存失败，请检查浏览器存储');
            },
            resetPlanDay() {
                const defaultDay = cloneData(WORKOUT_DB[this.state.selectedDay]);
                if (!confirm(`确定恢复“${defaultDay.title}”的默认计划？`)) return;
                this.state.workouts[this.state.selectedDay] = normalizeWorkoutPlan()[this.state.selectedDay];
                const saved = this.savePlan();
                this.renderAll();
                this.showToast(saved ? '已恢复默认计划' : '计划保存失败，请检查浏览器存储');
            },
            getMonthStats() {
                const base = parseDateKey(this.state.selectedDate);
                const month = base.getMonth();
                const year = base.getFullYear();
                const stats = { trainingDays: new Set(), completed: 0, strengthSets: 0, cardioMinutes: 0, cardioKcal: 0 };

                Object.keys(this.state.logs).forEach(dateKey => {
                    const date = parseDateKey(dateKey);
                    if (date.getFullYear() !== year || date.getMonth() !== month) return;
                    const record = this.state.logs[dateKey];
                    let dayHasLog = false;

                    Object.keys(record.entries || {}).forEach(exKey => {
                        const ex = this.getHistoricalExercise(record, exKey);
                        const rows = Array.isArray(record.entries[exKey]) ? record.entries[exKey] : [];
                        if (!ex || !isLogDone(ex, rows)) return;
                        stats.completed++;
                        dayHasLog = true;
                        rows.forEach(row => {
                            if (!rowIsCompleted(ex, row)) return;
                            if (ex.type === 'cardio') {
                                stats.cardioMinutes += toNumber(row.t);
                                stats.cardioKcal += toNumber(row.c);
                            } else if (ex.type === 'weighted' ? (row.w || row.r) : row.r) {
                                stats.strengthSets++;
                            }
                        });
                    });

                    if (dayHasLog) stats.trainingDays.add(dateKey);
                });

                return {
                    label: base.toLocaleDateString('zh-CN', { year: 'numeric', month: 'long' }),
                    trainingDays: stats.trainingDays.size,
                    completed: stats.completed,
                    strengthSets: stats.strengthSets,
                    cardioMinutes: stats.cardioMinutes,
                    cardioKcal: stats.cardioKcal
                };
            },
            renderMonthlySummary() {
                const monthStats = this.getMonthStats();
                document.getElementById('month-label').innerText = monthStats.label;
                document.getElementById('monthly-summary').innerHTML = [
                    { label: '训练天数', value: `${monthStats.trainingDays}天`, icon: 'fa-calendar-days' },
                    { label: '完成动作', value: `${monthStats.completed}个`, icon: 'fa-list-check' },
                    { label: '力量组数', value: `${monthStats.strengthSets}组`, icon: 'fa-dumbbell' },
                    { label: '有氧累计', value: `${monthStats.cardioMinutes}min`, icon: 'fa-heart-pulse' }
                ].map(item => `
                    <div class="bg-gray-50 p-3 rounded-2xl border border-gray-100 flex items-center gap-3">
                        <div class="w-9 h-9 rounded-xl bg-emerald-50 text-emerald-500 flex items-center justify-center flex-shrink-0"><i class="fa-solid ${item.icon} text-sm"></i></div>
                        <div><div class="text-lg font-black text-gray-900">${item.value}</div><div class="text-[10px] font-bold text-gray-400">${item.label}</div></div>
                    </div>
                `).join('');
            },
            getTrendOptions() {
                return [1, 2, 3, 4, 5].flatMap(day => {
                    const plan = this.state.workouts[day];
                    return (plan.exercises || []).map((ex, idx) => ({
                        key: `${day}:${ex.id}`,
                        day,
                        idx,
                        ex,
                        label: `周${['一','二','三','四','五'][day - 1]} · ${ex.name}`
                    }));
                });
            },
            renderTrendOptions() {
                const select = document.getElementById('trend-exercise-select');
                if (!select) return;
                const options = this.getTrendOptions();
                const previous = this.state.trendKey || select.value;
                select.innerHTML = options.length ? options.map(item =>
                    `<option value="${escapeAttr(item.key)}">${escapeHtml(item.label)}</option>`
                ).join('') : `<option value="">暂无动作</option>`;
                this.state.trendKey = options.some(item => item.key === previous) ? previous : (options[0] ? options[0].key : '');
                select.value = this.state.trendKey;
            },
            getTrendData(key) {
                const separator = String(key || '').indexOf(':');
                const day = Number(String(key || '').slice(0, separator));
                const exerciseId = String(key || '').slice(separator + 1);
                const ex = this.state.workouts[day] && this.state.workouts[day].exercises.find(item => item.id === exerciseId);
                if (!ex) return { labels: [], values: [], unit: '' };

                const labels = [];
                const values = [];
                Object.keys(this.state.logs).sort().forEach(dateKey => {
                    const record = this.state.logs[dateKey];
                    const rows = record && record.day === day && record.entries ? record.entries[exerciseId] : null;
                    if (!isLogDone(ex, rows)) return;
                    const completedRows = rows.filter(row => rowIsCompleted(ex, row));

                    let value = 0;
                    if (ex.type === 'cardio') {
                        value = completedRows.reduce((sum, row) => sum + toNumber(row.t), 0);
                    } else if (ex.type === 'weighted') {
                        value = Math.max(...completedRows.map(row => toNumber(row.w)), 0);
                    } else {
                        value = Math.max(...completedRows.map(row => toNumber(row.r)), 0);
                    }

                    if (!value) return;
                    labels.push(formatShortDate(dateKey));
                    values.push(value);
                });

                return {
                    labels,
                    values,
                    unit: ex.type === 'cardio' ? '分钟' : (ex.type === 'weighted' ? 'kg' : (ex.type === 'time' ? '秒' : '次'))
                };
            },
            renderTrendChart() {
                const select = document.getElementById('trend-exercise-select');
                const empty = document.getElementById('trend-empty');
                const wrap = document.getElementById('trend-chart-wrap');
                if (!select || !empty || !wrap) return;
                this.state.trendKey = select.value;
                const trend = this.getTrendData(this.state.trendKey);

                if (this.state.trendChart) {
                    this.state.trendChart.destroy();
                    this.state.trendChart = null;
                }

                if (!trend.values.length) {
                    empty.classList.remove('hidden');
                    wrap.classList.add('hidden');
                    return;
                }

                empty.classList.add('hidden');
                wrap.classList.remove('hidden');
                this.state.trendChart = new Chart(document.getElementById('trendChart').getContext('2d'), {
                    type: 'line',
                    data: {
                        labels: trend.labels,
                        datasets: [{
                            label: trend.unit,
                            data: trend.values,
                            borderColor: 'rgb(16, 185, 129)',
                            backgroundColor: 'rgba(16, 185, 129, 0.12)',
                            fill: true,
                            tension: 0.35,
                            pointRadius: 4,
                            pointBackgroundColor: 'rgb(16, 185, 129)'
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { legend: { display: false } },
                        scales: { y: { beginAtZero: true, ticks: { callback: value => `${value}${trend.unit}` } } }
                    }
                });
            },
            renderStats() {
                const ctx = document.getElementById('completionChart').getContext('2d');
                const days = [1, 2, 3, 4, 5].filter(d => this.state.workouts[d].exercises.length);
                const labels = days.map(d => {
                    const date = dateForWeekday(d, parseDateKey(this.state.selectedDate));
                    return `周${['一','二','三','四','五'][d-1]} ${date.toLocaleDateString('zh-CN', { month: 'numeric', day: 'numeric' })}`;
                });
                let totalExercises = 0;
                let completedExercises = 0;
                let trainingDays = 0;
                let cardioMinutes = 0;
                let cardioKcal = 0;
                let strengthSets = 0;

                const data = days.map(d => {
                    const def = this.state.workouts[d];
                    const dateKey = toDateKey(dateForWeekday(d, parseDateKey(this.state.selectedDate)));
                    const record = this.state.logs[dateKey] || { entries: {} };
                    let c = 0;
                    let dayHasLog = false;
                    def.exercises.forEach((ex, i) => { 
                        totalExercises++;
                        const rows = this.getExerciseRows(record, ex, i);
                        if (isLogDone(ex, rows)) {
                            c++;
                            completedExercises++;
                            dayHasLog = true;
                        }
                        rows.forEach(row => {
                            if (!rowIsCompleted(ex, row)) return;
                            if (ex.type === 'cardio') {
                                cardioMinutes += toNumber(row.t);
                                cardioKcal += toNumber(row.c);
                            } else if (row.w || row.r) {
                                strengthSets++;
                            }
                        });
                    });
                    if (dayHasLog) trainingDays++;
                    return def.exercises.length ? Math.round((c / def.exercises.length) * 100) : 0;
                });

                const total = totalExercises ? Math.round((completedExercises / totalExercises) * 100) : 0;
                document.getElementById('weekly-summary').innerHTML = [
                    { label: '本周完成', value: `${total}%`, icon: 'fa-circle-check' },
                    { label: '训练天数', value: `${trainingDays}天`, icon: 'fa-calendar-check' },
                    { label: '力量组数', value: `${strengthSets}组`, icon: 'fa-dumbbell' },
                    { label: '有氧累计', value: `${cardioMinutes}min`, icon: 'fa-heart-pulse' },
                    { label: '有氧热量', value: `${cardioKcal}kcal`, icon: 'fa-fire' },
                    { label: '完成动作', value: `${completedExercises}/${totalExercises}`, icon: 'fa-list-check' }
                ].map(item => `
                    <div class="bg-white p-3 rounded-2xl border border-gray-100 flex items-center gap-3">
                        <div class="w-9 h-9 rounded-xl bg-blue-50 text-blue-500 flex items-center justify-center flex-shrink-0"><i class="fa-solid ${item.icon} text-sm"></i></div>
                        <div><div class="text-lg font-black text-gray-900">${item.value}</div><div class="text-[10px] font-bold text-gray-400">${item.label}</div></div>
                    </div>
                `).join('');

                const recent = [];
                Object.keys(this.state.logs).sort().reverse().forEach(dateKey => {
                    const record = this.state.logs[dateKey];
                    Object.keys(record.entries || {}).forEach(exKey => {
                        const ex = this.getHistoricalExercise(record, exKey);
                        if (!ex || ex.type !== 'weighted') return;
                        const rows = Array.isArray(record.entries[exKey]) ? record.entries[exKey] : [];
                        const row = rows.find(r => rowIsCompleted(ex, r) && r.w);
                        if (!row || recent.some(item => item.name === ex.name)) return;
                        recent.push({ name: ex.name, date: dateKey, status: dayStatusLabel(record.status), w: row.w || '自重', r: row.r || '-' });
                    });
                });
                document.getElementById('recent-progress-list').innerHTML = recent.length ? recent.slice(0, 5).map(item => `
                    <div class="flex items-center justify-between bg-white rounded-2xl border border-gray-100 p-3">
                        <div class="min-w-0">
                            <div class="font-bold text-gray-800 truncate">${escapeHtml(item.name)}</div>
                            <div class="text-[11px] text-gray-400 mt-1">${escapeHtml(item.date)} · ${escapeHtml(item.status)}</div>
                        </div>
                        <div class="text-right font-black text-gray-900">${escapeHtml(item.w)} × ${escapeHtml(item.r)}</div>
                    </div>
                `).join('') : `<p class="text-gray-400 text-sm">暂无力量记录。</p>`;

                if (this.state.chart) this.state.chart.destroy();
                this.state.chart = new Chart(ctx, { type: 'bar', data: { labels, datasets: [{ label: '完成度 (%)', data, backgroundColor: 'rgba(59, 130, 246, 0.6)', borderRadius: 6 }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, max: 100 } } } });
                this.renderMonthlySummary();
                this.renderTrendOptions();
                this.renderTrendChart();
            },
            exportData() {
                const rows = [["日期", "星期", "训练状态", "训练部位", "动作名称", "有氧方式", "组序", "重量(KG)/时长(Min)", "次数/心率", "RIR", "卡路里/备注"]];
                let has = false;
                Object.keys(this.state.logs).sort().forEach(dateKey => {
                    const record = this.state.logs[dateKey];
                    const d = record.day || getWeekday(parseDateKey(dateKey));
                    const def = this.state.workouts[d];
                    if (!def) return;
                    const weekName = parseDateKey(dateKey).toLocaleDateString('zh-CN', { weekday: 'long' });
                    Object.keys(record.entries || {}).forEach(exKey => {
                        const ex = this.getHistoricalExercise(record, exKey);
                        const sets = Array.isArray(record.entries[exKey]) ? record.entries[exKey] : [];
                        if (!ex) return;
                        sets.forEach((set, sIdx) => {
                            if (!rowIsCompleted(ex, set)) return;
                            if (ex.type === 'cardio') {
                                if (set.t || set.c) { 
                                    has = true; 
                                    rows.push([dateKey, weekName, dayStatusLabel(record.status), def.title, ex.name, set.m || '有氧运动', sIdx + 1, `${set.t} min`, `${set.h} bpm`, '', `${set.c} kcal`]);
                                }
                            } else {
                                if (set.w || set.r) { 
                                    has = true; 
                                    rows.push([dateKey, weekName, dayStatusLabel(record.status), def.title, ex.name, '', sIdx + 1, set.w, set.r, set.rir || '', ex.detail]);
                                }
                            }
                        });
                    });
                });
                if (!has) { alert("暂无数据"); return; }
                const csv = `\uFEFF${rows.map(row => row.map(escapeCsvCell).join(',')).join('\r\n')}`;
                const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `训练日志_${toDateKey(new Date())}.csv`;
                document.body.appendChild(a);
                a.click();
                a.remove();
                setTimeout(() => URL.revokeObjectURL(url), 1000);
            },
            exportBackup() {
                const payload = {
                    app: "训练日志",
                    version: 4,
                    exportedAt: new Date().toISOString(),
                    logsByDate: this.state.logs,
                    workoutPlan: this.state.workouts
                };
                const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `健身日志备份_${toDateKey(new Date())}.json`;
                document.body.appendChild(a);
                a.click();
                a.remove();
                setTimeout(() => URL.revokeObjectURL(url), 1000);
            },
            importBackup() {
                document.getElementById('backup-file-input').click();
            },
            handleBackupFile(input) {
                const file = input.files && input.files[0];
                if (!file) return;
                if (file.size > 5 * 1024 * 1024) {
                    alert("备份文件超过 5MB，请检查文件是否正确。");
                    input.value = '';
                    return;
                }
                const reader = new FileReader();
                reader.onload = () => {
                    try {
                        const parsed = JSON.parse(reader.result);
                        if (!isPlainObject(parsed)) throw new Error('Invalid backup');
                        const logs = parsed.logsByDate || parsed.logs;
                        if (!isPlainObject(logs) || Object.keys(logs).length > 5000) throw new Error('Invalid backup');
                        const cleaned = {};
                        Object.keys(logs).forEach(dateKey => {
                            if (!/^\d{4}-\d{2}-\d{2}$/.test(dateKey)) return;
                            const parsedDate = parseDateKey(dateKey);
                            if (Number.isNaN(parsedDate.getTime()) || toDateKey(parsedDate) !== dateKey) return;
                            const record = isPlainObject(logs[dateKey]) ? logs[dateKey] : {};
                            const day = Number(record.day) || getWeekday(parsedDate);
                            if (day < 1 || day > 5 || !isPlainObject(record.entries)) return;
                            const entries = {};
                            const exerciseSnapshots = {};
                            const usedKeys = new Set();
                            const rawSnapshots = isPlainObject(record.exerciseSnapshots) ? record.exerciseSnapshots : {};
                            Object.keys(record.entries).slice(0, 200).forEach((key, entryIndex) => {
                                let safeKey = sanitizeExerciseId(key, `imported-${entryIndex}`);
                                while (usedKeys.has(safeKey)) safeKey = createExerciseId('imported');
                                usedKeys.add(safeKey);
                                entries[safeKey] = sanitizeRows(record.entries[key]);
                                const snapshot = sanitizeSnapshot(rawSnapshots[key] || rawSnapshots[safeKey], safeKey);
                                if (snapshot) exerciseSnapshots[safeKey] = { ...snapshot, id: safeKey };
                            });
                            cleaned[dateKey] = {
                                version: 4,
                                day,
                                status: normalizeDayStatus(record.status),
                                entries,
                                exerciseSnapshots
                            };
                        });
                        if (!Object.keys(cleaned).length) throw new Error('Empty backup');
                        if (!confirm("恢复备份会覆盖当前本地数据，确定继续？")) return;
                        let planSaved = true;
                        if (parsed.workoutPlan) {
                            this.state.workouts = normalizeWorkoutPlan(parsed.workoutPlan);
                            planSaved = this.savePlan();
                        }
                        this.state.logs = cleaned;
                        this.migrateLogs();
                        const logsSaved = this.persistLocal();
                        this.renderAll();
                        this.showToast(planSaved && logsSaved ? "备份已恢复" : '备份已载入，但浏览器未能持久保存');
                    } catch (e) {
                        alert("备份文件格式不正确，无法恢复。");
                    } finally {
                        input.value = '';
                    }
                };
                reader.onerror = () => {
                    alert('备份文件读取失败。');
                    input.value = '';
                };
                reader.readAsText(file);
            }
        };
        window.App = App;
        App.init();
    </script>
